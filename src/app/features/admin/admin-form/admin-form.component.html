<mat-card class="m-4 text-gray-700 max-w-3/8 filter-article filter-interactive">
  <div mat-dialog-title [ngStyle]="{ 'border-left': '10px solid' }">
    {{ sTitle }}
  </div>
  <div mat-dialog-content>
    <form  [formGroup]="mainpageGroup"  (ngSubmit)="onUpdate(mainpageGroup.value)" class="form"
    >
      <mat-form-field class="m-1 form-element" [ngStyle]="{ width: '100%' }">
        <mat-label>Landing Page Hero Commentary</mat-label>
        <input matInput formControlName="hero_title" />
      </mat-form-field>

      <mat-form-field class="m-1 form-element" [ngStyle]="{ width: '100%' }">
        <mat-label>Features Header</mat-label>
        <input matInput formControlName="features_header" />
      </mat-form-field>

      <mat-form-field class="m-1 form-element" [ngStyle]="{ width: '100%' }">
        <mat-label>Features Sub Header</mat-label>
        <input matInput  formControlName="features_subheader" />
      </mat-form-field>

      <mat-form-field class="m-1 form-element" [ngStyle]="{ width: '49%' }">
        <mat-label>Right Call to Action</mat-label>
        <input matInput  formControlName="cta_left" />
      </mat-form-field>

      <mat-form-field class="m-1 form-element" [ngStyle]="{ width: '50%' }">
        <mat-label>Left Call to Action</mat-label>
        <input matInput  formControlName="cta_right" />
      </mat-form-field>

      <section>
        <div mat-dialog-title class="font-bold">
          Contact Information
        </div>
      <mat-form-field class="m-1 form-element" [ngStyle]="{ width: '32%' }">
        <mat-label>eMail</mat-label>
        <input matInput formControlName="contact_email" />
      </mat-form-field>

      <mat-form-field class="m-1 form-element" [ngStyle]="{ width: '32%' }">
        <mat-label>Telephone Number</mat-label>
        <input matInput formControlName="contact_telephone" />
      </mat-form-field>

      <mat-form-field class="m-1 form-element" [ngStyle]="{ width: '33%' }">
        <mat-label>Shipping Locations</mat-label>
        <input matInput formControlName="contact_shipping" />
      </mat-form-field>
      </section>

      <!-- <mat-radio-group>
        <mat-radio-button class="m-1" value="true">Active</mat-radio-button>
        <mat-radio-button class="m-1" value="false">InActive</mat-radio-button>
      </mat-radio-group> -->

    </form>
  </div>
  <div mat-dialog-actions class="mt-10">
    <button class="m-1"  mat-flat-button (click)="onUpdate(mainPage)"   color="primary" aria-label="Add" >
      <mat-icon [svgIcon]="'mat_outline:update'"></mat-icon>
      Update
    </button>
    <!-- <button class="m-1" mat-icon-button mat-flat-button (click)="onCreate()" color="primary"  [disabled]="!adminGroup.valid"       >
      <mat-icon [svgIcon]="'mat_outline:add'"></mat-icon>
    </button>
    <button class="m-1" mat-icon-button mat-flat-button (click)="onDelete(product)" color="primary"  [disabled]="!adminGroup.valid"        >
      <mat-icon [svgIcon]="'mat_outline:delete'"></mat-icon>
    </button> -->
    <!-- <button class="m-1"  mat-icon-button mat-flat-button (click)="onImages()" color="primary" [disabled]="!adminGroup.valid"  >
      <mat-icon [svgIcon]="'mat_outline:design_services'"></mat-icon>
    </button> -->
  </div>
</mat-card>
